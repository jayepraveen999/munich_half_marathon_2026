name: Build and deploy dashboard to GitHub Pages

on:
  schedule:
    - cron: '0 1 * * *'    # every day at 01:00 UTC = 03:00 CEST (Munich) — nightly refresh
    - cron: '0 11 * * *'   # every day at 11:00 UTC = 13:00 CEST (Munich) — post-morning-run refresh
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync activities from Intervals.icu
        env:
          INTERVALS_ICU_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: python scripts/sync_data.py

      - name: Update plan tracking (actuals only, no auto-adjustment)
        run: python scripts/adjust_plan.py

      - name: Generate dashboard
        run: |
          python scripts/generate_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/training.ics i644393_activities.csv i644393_wellness.csv run_curves.json plan.json
          git diff --cached --quiet || git commit -m "chore: sync data + regenerate dashboard [skip ci]"
          git push
